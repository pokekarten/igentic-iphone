<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">iGentic social preview card</title>
  <desc id="desc">A clean social preview card for the iGentic open-source personal AI control layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#E0EEFF"/>
    </linearGradient>
    <linearGradient id="ring" x1="820" y1="150" x2="1100" y2="480" gradientUnits="userSpaceOnUse">
