      <stop offset="0.55" stop-color="#8EC5FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" rx="56" fill="url(#bg)"/>
  <text x="96" y="168" fill="#111827" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, system-ui, sans-serif" font-size="86" font-weight="500" letter-spacing="-3">iGentic</text>
