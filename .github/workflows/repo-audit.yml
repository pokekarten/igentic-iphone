name: Repo Audit

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  repo-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout repository without marketplace actions
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"; then
            echo "Fetched ${GITHUB_SHA}"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PR_NUMBER:-}" ]; then
            git fetch --no-tags --depth=1 origin "pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_REF_NAME:-main}"
          fi
          git checkout --force FETCH_HEAD
          git clean -fdx
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Show Python version
        run: python3 --version

      - name: Validate repo structure
        run: python3 scripts/validate_repo_structure.py

      - name: Test autonomy gate evaluator
        run: python3 scripts/autonomy/test_evaluate_pr.py

      - name: Audit public project control files
        run: |
          set -euo pipefail
          required=(
            README.md
            PROJECT_STATE.md
            ROADMAP.md
            GOVERNANCE.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            SUPPORT.md
            docs/GITHUB_CONTROL.md
            docs/VALIDATION.md
            docs/CHATGPT_NEXT_TASK.md
            docs/PUBLIC_REPO_SETUP.md
            docs/OPEN_SOURCE_ISSUE_PLAN.md
            .github/PULL_REQUEST_TEMPLATE.md
            .github/ISSUE_TEMPLATE/validation_task.md
          )
          missing=0
          for path in "${required[@]}"; do
            if [ ! -s "$path" ]; then
              echo "Missing or empty: $path"
              missing=1
            fi
          done
          exit "$missing"

      - name: Summarize audit
        run: |
          {
            echo "## Repo Audit"
            echo ""
            echo "Commit: ${GITHUB_SHA}"
            echo ""
            echo "- Repo structure validator completed."
            echo "- Autonomy gate evaluator unit tests completed in this contents-read workflow."
            echo "- Required public project control files are present and non-empty."
          } >> "$GITHUB_STEP_SUMMARY"
