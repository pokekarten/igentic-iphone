name: Repo Audit

on:
  pull_request:
  workflow_dispatch:

jobs:
  repo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate repo structure
        run: python scripts/validate_repo_structure.py
