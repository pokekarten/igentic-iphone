name: Pull Request Quality

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR body quality
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          body="${PR_BODY:-}"
          missing=0

          # Accept either markdown headings (e.g. "## Safety") or colon-style markers ("Safety:")
          for marker in "Summary" "Scope" "Validation" "Safety" "Follow-up"; do
            if ! printf '%s\n' "$body" | grep -Eiq "^\s*#+\s*${marker}\b|${marker}:"; then
              echo "Missing PR section marker: $marker"
              missing=1
            fi
          done

          # Accept explicit command invocation or a natural-language statement about validating repo structure
          if ! printf '%s\n' "$body" | grep -Eiq "python3 scripts/validate_repo_structure.py|validate.*repo.*structure|validated.*repo.*structure"; then
            echo "PR body should mention repo structure validation."
            missing=1
          fi

          # Accept either the literal 'swift test' or an explicit explanation that Swift tests are not applicable
          if ! printf '%s\n' "$body" | grep -Eiq "swift test|no swift tests|swift tests? not applicable|tests not applicable|tests not required"; then
            echo "PR body should mention Swift tests or explain why not applicable."
            missing=1
          fi

          exit "$missing"

      - name: Summarize PR quality
        run: |
          {
            echo "## Pull Request Quality"
            echo ""
            echo "PR body includes core planning, validation and safety sections."
          } >> "$GITHUB_STEP_SUMMARY"
