name: PR Autonomy Gate

on:
  workflow_run:
    workflows:
      - "PR Change Scope"
      - "Pull Request Quality"
      - "Repo Audit"
      - "Phase 0 CI Validation"
      - "Docs Consistency"
      - "Workflow Lint"
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional open pull request number to reconcile"
        required: false
        type: string
  schedule:
    - cron: "17 * * * *"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.pull_requests[0].number || github.event.inputs.pr_number || 'reconcile' }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  shadow-gate:
    permissions:
      actions: read
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.inputs.pr_number }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout trusted default branch without marketplace actions
        run: |
          set -euo pipefail
          branch="${DEFAULT_BRANCH:-main}"
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "$branch"
          git checkout --force FETCH_HEAD
          git clean -fdx
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Verify trusted evaluator logic
        run: python3 scripts/autonomy/test_evaluate_pr.py

      - name: Reconcile open pull request evidence
        run: python3 scripts/autonomy/evaluate_pr.py

      - name: Summarize shadow boundary
        if: ${{ always() }}
        run: |
          {
            echo "## PR Autonomy Gate"
            echo ""
            echo "Mode: shadow-only"
            echo "Event: ${GITHUB_EVENT_NAME}"
            echo "Repository: ${GITHUB_REPOSITORY}"
            echo ""
            echo "This workflow contains no pull_request trigger and executes only trusted default-branch code."
            echo "It does not merge, update branches, close issues, write to Brain or execute PR-head code or artifacts."
          } >> "${GITHUB_STEP_SUMMARY}"
