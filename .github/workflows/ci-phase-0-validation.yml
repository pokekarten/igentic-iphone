name: Phase 0 CI Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  repo-structure:
    name: Validate repo structure
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate required files and forbidden artifacts
        run: python scripts/validate_repo_structure.py

  swift-package:
    name: Swift package build and test
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package
        working-directory: ios
        run: swift build

      - name: Run Swift tests
        working-directory: ios
        run: swift test
