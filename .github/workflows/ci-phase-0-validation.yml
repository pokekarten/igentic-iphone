name: Phase 0 CI Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  repo-structure:
    name: Validate repo structure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout repository without marketplace actions
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"; then
            echo "Fetched ${GITHUB_SHA}"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PR_NUMBER:-}" ]; then
            git fetch --no-tags --depth=1 origin "pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_REF_NAME:-main}"
          fi
          git checkout --force FETCH_HEAD
          git clean -fdx
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Show Python version
        run: python3 --version

      - name: Validate required files and forbidden artifacts
        run: python3 scripts/validate_repo_structure.py

  swift-package:
    name: Swift package build and test
    runs-on: macos-15
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout repository without marketplace actions
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"; then
            echo "Fetched ${GITHUB_SHA}"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PR_NUMBER:-}" ]; then
            git fetch --no-tags --depth=1 origin "pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_REF_NAME:-main}"
          fi
          git checkout --force FETCH_HEAD
          git clean -fdx
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package
        working-directory: ios
        run: swift build

      - name: Run Swift tests
        working-directory: ios
        run: swift test

  swift-package-linux:
    name: Swift package Linux build and test
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout repository without marketplace actions
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          if git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"; then
            echo "Fetched ${GITHUB_SHA}"
          elif [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ -n "${PR_NUMBER:-}" ]; then
            git fetch --no-tags --depth=1 origin "pull/${PR_NUMBER}/merge"
          else
            git fetch --no-tags --depth=1 origin "${GITHUB_REF_NAME:-main}"
          fi
          git checkout --force FETCH_HEAD
          git clean -fdx
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Show Swift version
        run: swift --version

      - name: Build Swift package on Linux
        working-directory: ios
        run: swift build

      - name: Run Swift tests on Linux
        working-directory: ios
        run: swift test
