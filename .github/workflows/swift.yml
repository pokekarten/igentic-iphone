name: Swift

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Swift package tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        working-directory: ios
        run: swift test

      - name: Build package
        working-directory: ios
        run: swift build
